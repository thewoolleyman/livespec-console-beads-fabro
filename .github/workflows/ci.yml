name: CI

on:
  pull_request:
  push:
    branches: [master]
  merge_group:

jobs:
  check:
    name: ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - check-format
          - check-clippy
          - check-test
          - check-nextest
          - check-coverage
          - check-deps
          - check-arch
          - check-behavior-coverage
          # The `baseline` worktree-discipline verifier — REUSES the shared
          # livespec-dev-tooling installer + verifier (no re-implementation),
          # per livespec/SPECIFICATION/non-functional-requirements.md
          # §"Conformance Pattern". A fresh actions/checkout is structurally a
          # primary (git-dir == git-common-dir) with no bootstrap run, so the
          # installer step below must install the canonical hook BEFORE the
          # verifier runs (mirroring livespec-dev-tooling's own CI).
          - check-baseline
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pinned binaries via mise
        uses: jdx/mise-action@v2

      # The baseline job is pure-Python (uv) and never touches cargo, so it
      # skips the cargo cache; the Rust targets keep it.
      - name: Cache cargo registry and build output
        if: matrix.target != 'check-baseline'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      # ---- baseline (worktree-discipline) reuse: uv env + hook install ----
      - name: Restore uv download cache
        if: matrix.target == 'check-baseline'
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: uv-${{ runner.os }}-

      - name: Install canonical commit-refuse hook (satisfy baseline verifier)
        if: matrix.target == 'check-baseline'
        run: just install-commit-refuse-hooks

      - name: Install cargo-nextest
        if: matrix.target == 'check-nextest'
        uses: taiki-e/install-action@nextest

      - name: Install cargo-llvm-cov
        if: matrix.target == 'check-coverage'
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Install dependency audit tools
        if: matrix.target == 'check-deps'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny,cargo-machete

      - name: just ${{ matrix.target }}
        run: just ${{ matrix.target }}

  # livespec core's doctor STATIC phase (reference-discipline + out-of-band
  # invariants), wired fleet-wide per livespec epic livespec-6jfq. core ships
  # the checker (doctor_static.py — self-contained, bare python3); this job
  # checks core out at the tag THIS repo pins (.livespec.jsonc compat.pinned)
  # and points the recipe at it via LIVESPEC_CORE_PLUGIN_ROOT. Its OWN job
  # (not the matrix above) because it needs a second checkout — livespec core
  # — that no other target does.
  check-doctor-static:
    name: check-doctor-static
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pinned binaries via mise
        uses: jdx/mise-action@v2

      - name: Resolve pinned livespec core ref (.livespec.jsonc compat.pinned)
        id: corepin
        run: |
          pinned="$(grep -oE '"pinned"[[:space:]]*:[[:space:]]*"[^"]*"' .livespec.jsonc | head -1 | sed -E 's/.*:[[:space:]]*"([^"]*)".*/\1/')"
          echo "ref=${pinned:-master}" >> "$GITHUB_OUTPUT"

      - name: Checkout livespec core at the pinned ref
        uses: actions/checkout@v4
        with:
          repository: thewoolleyman/livespec
          ref: ${{ steps.corepin.outputs.ref }}
          path: .livespec-core

      - name: just check-doctor-static
        env:
          LIVESPEC_CORE_PLUGIN_ROOT: ${{ github.workspace }}/.livespec-core/.claude-plugin
        run: just check-doctor-static
