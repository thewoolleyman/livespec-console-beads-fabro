name: CI

on:
  pull_request:
  push:
    branches: [master]
  merge_group:

jobs:
  check:
    name: ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - check-format
          - check-clippy
          - check-test
          - check-nextest
          - check-coverage
          - check-deps
          - check-arch
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pinned binaries via mise
        uses: jdx/mise-action@v2

      - name: Cache cargo registry and build output
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Install cargo-nextest
        if: matrix.target == 'check-nextest'
        uses: taiki-e/install-action@nextest

      - name: Install cargo-llvm-cov
        if: matrix.target == 'check-coverage'
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Install dependency audit tools
        if: matrix.target == 'check-deps'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny,cargo-machete

      - name: just ${{ matrix.target }}
        run: just ${{ matrix.target }}
