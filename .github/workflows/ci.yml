# Per-target matrix CI for livespec-console-beads-fabro (the fleet's one RUST repo).
#
# The check matrix + check-doctor-static run in the SAME baked image the Fabro
# sandbox uses, on the local self-hosted runner — so "green in CI" and "green in
# sandbox" are the same environment (livespec plan/fabro-ci-image-factoring).
# The tag is python-rust-v0.48.2: the layered Rust image, and specifically the
# tag THIS repo's own .fabro/workflows/implement-work-item/workflow.toml pins.
# Do NOT copy the Python members' python-v0.43.2 — a different layer AND a
# drifted tag (livespec-dev-tooling-xb7).
#
# runs-on resolves from the repo variable CI_RUNNER_LABELS, defaulting to the
# self-hosted label; set it to '["ubuntu-latest"]' to reroute to GitHub-hosted
# when the local host is down (the merge-gate fallback). ci-green stays
# ubuntu-latest so the branch-protection context is reportable host-down.

name: CI

# merge_group is deliberately ABSENT: no merge queue is configured for this repo
# (verified live — zero rulesets, required_merge_queue: null; branch protection
# requires only ci-green). Keeping the vestigial trigger would be exactly the
# routing hole the trusted-event audit forbids, since merge_group is not a
# fork-gated event and the jobs below are self-hosted. Re-add it WITH hosted
# routing only if a merge queue is adopted.
on:
  pull_request:
  push:
    branches: [master]

jobs:
  check:
    name: ${{ matrix.target }}
    # Local self-hosted runner in the baked python-rust image (fallback: set the
    # CI_RUNNER_LABELS repo variable to '["ubuntu-latest"]').
    runs-on: ${{ fromJSON(vars.CI_RUNNER_LABELS || '["self-hosted","local-ci"]') }}
    container:
      image: ghcr.io/thewoolleyman/livespec-fabro-sandbox:python-rust-v0.52.1
    env:
      # The image installs the pinned tools under /root (build-time HOME), but
      # container-hooks run steps with a DIFFERENT HOME — so mise's default data
      # dir ($HOME/.local/share/mise) is empty and `mise install` would RE-fetch
      # every tool. At matrix scale that means concurrent UNauthed GitHub-API
      # installs, which blow the anonymous rate limit and red the run (proven
      # live on livespec's cutover). Point mise at the baked data dir so
      # `mise install` is a true no-op.
      MISE_DATA_DIR: /root/.local/share/mise
      # A missing shim must fail fast, never busy-loop on auto-install.
      MISE_NOT_FOUND_AUTO_INSTALL: "0"
      # Defense-in-depth against GitHub's anonymous REST limit (60/hr PER IP):
      # the self-hosted matrix shares ONE host IP, and this repo's
      # taiki-e/install-action steps DOWNLOAD cargo tools from GitHub releases on
      # every run — exactly the kind of residual API traffic that hits the anon
      # wall. The per-run, auto-revoked, read-scoped Actions token lifts them to
      # the authenticated (~1000/hr) cap. NOT a Kind-2 secret.
      GITHUB_TOKEN: ${{ github.token }}
      GH_TOKEN: ${{ github.token }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - check-format
          - check-clippy
          - check-test
          - check-nextest
          - check-coverage
          - check-deps
          - check-arch
          - check-behavior-coverage
          - check-completeness
          # The `baseline` worktree-discipline verifier — REUSES the shared
          # livespec-dev-tooling installer + verifier (no re-implementation),
          # per livespec/SPECIFICATION/non-functional-requirements.md
          # §"Conformance Pattern". A fresh actions/checkout is structurally a
          # primary (git-dir == git-common-dir) with no bootstrap run, so the
          # installer step below must install the canonical hook BEFORE the
          # verifier runs (mirroring livespec-dev-tooling's own CI).
          - check-baseline
          - check-plugin-resolution
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Hosted routing (CI_RUNNER_LABELS='["ubuntu-latest"]') keeps the baked
      # container: image, so git runs as ROOT over a uid-1001 checkout →
      # "detected dubious ownership" (exit 128) on every post-checkout git call.
      # actions/checkout's own safe.directory is scoped to a temp HOME it
      # discards, and resolve_repo_root() strips all GIT_* env before shelling
      # git, so an env-var safe.directory is invisible. Write it to the global
      # gitconfig (HOME=/github/home, preserved across the scrub) so every git
      # call reads it. No-op on the self-hosted lane.
      - name: Trust workspace for git (hosted container root-vs-checkout uid)
        run: git config --global --add safe.directory '*'

      # The Rust toolchain is BAKED into the python-rust image (rustc/cargo/
      # clippy/rustfmt 1.92.0 at /root/.cargo/bin, matching rust-toolchain.toml),
      # so `mise install` is a near-no-op that just confirms the pinned versions.
      # A fresh container does not TRUST the repo .mise.toml, so `mise trust` is
      # required for the shims to resolve.
      - name: mise trust + install (baked tools — install is a near-no-op)
        run: |
          mise trust
          mise install

      # The actions/cache steps (cargo registry + git + target, and the uv cache
      # for check-baseline) are DELETED — this is not a leap of faith, it was
      # MEASURED in this exact image on this host against the real workspace:
      #   cargo clippy --workspace --all-targets  COLD here 37s vs 53s WARM-cached on ubuntu-latest
      #   cargo test  --workspace                 COLD here 35s vs 48s WARM-cached on ubuntu-latest
      # A cold build on this 18-core box beats a warm-cached build on a 2-4 core
      # GitHub runner, so the cache was buying nothing we cannot out-compute. And
      # KEEPING actions/cache on a self-hosted runner would be actively worse: it
      # would network-restore/save a multi-GB cache FROM this host every run —
      # precisely the cost co-locating removes — while fighting the 10 GB/repo cap.
      # (check-coverage/check-nextest build under different profiles, so the warm
      # cache barely helped them even before this change.)

      # ---- baseline (worktree-discipline) reuse: uv env + hook install ----
      - name: Install commit-refuse hook + worktree pack (satisfy baseline verifier)
        if: matrix.target == 'check-baseline'
        run: |
          just install-commit-refuse-hooks
          just install-worktree-pack

      # Prebuild ALL FOUR quality tools (not just the target's own) for every job
      # that calls `just ensure-rust-quality-tools`. That recipe does
      # `command -v <tool> || cargo install --locked <tool>`, so any tool NOT on
      # PATH is compiled FROM SOURCE — ~740s wasted per job on this self-hosted
      # runner (measured 2026-07-18: check-deps spent its whole 810s building
      # nextest+llvm-cov from source). The taiki-e prebuilt binaries are on PATH,
      # so ensure-rust-quality-tools finds them and returns immediately.
      - name: Install rust quality tools (prebuilt — avoids source builds)
        if: matrix.target == 'check-nextest' || matrix.target == 'check-coverage' || matrix.target == 'check-deps'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest,cargo-llvm-cov,cargo-deny,cargo-machete

      - name: just ${{ matrix.target }}
        run: just ${{ matrix.target }}

  # livespec core's doctor STATIC phase (reference-discipline + out-of-band
  # invariants), wired fleet-wide per livespec epic livespec-6jfq. core ships
  # the checker (doctor_static.py — self-contained, bare python3); this job
  # checks core out at the tag THIS repo pins (.livespec.jsonc compat.pinned)
  # and points the recipe at it via LIVESPEC_CORE_PLUGIN_ROOT. Its OWN job
  # (not the matrix above) because it needs a second checkout — livespec core
  # — that no other target does.
  check-doctor-static:
    name: check-doctor-static
    # Self-hosted in the baked image. The livespec-core checkout below is a fresh
    # PUBLIC clone INSIDE the container (no host mount — containment preserved).
    runs-on: ${{ fromJSON(vars.CI_RUNNER_LABELS || '["self-hosted","local-ci"]') }}
    container:
      image: ghcr.io/thewoolleyman/livespec-fabro-sandbox:python-rust-v0.52.1
    env:
      MISE_DATA_DIR: /root/.local/share/mise
      MISE_NOT_FOUND_AUTO_INSTALL: "0"
      GITHUB_TOKEN: ${{ github.token }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Trust the workspace for git under hosted routing (baked container runs
      # git as ROOT over a uid-1001 checkout → "dubious ownership" exit 128).
      # See the `check` job for the full rationale. No-op on the self-hosted lane.
      - name: Trust workspace for git (hosted container root-vs-checkout uid)
        run: git config --global --add safe.directory '*'

      - name: mise trust + install (baked tools — install is a near-no-op)
        run: |
          mise trust
          mise install

      - name: Resolve pinned livespec core ref (.livespec.jsonc compat.pinned)
        id: corepin
        run: |
          pinned="$(grep -oE '"pinned"[[:space:]]*:[[:space:]]*"[^"]*"' .livespec.jsonc | head -1 | sed -E 's/.*:[[:space:]]*"([^"]*)".*/\1/')"
          echo "ref=${pinned:-master}" >> "$GITHUB_OUTPUT"

      - name: Checkout livespec core at the pinned ref
        uses: actions/checkout@v4
        with:
          repository: thewoolleyman/livespec
          ref: ${{ steps.corepin.outputs.ref }}
          path: .livespec-core

      - name: just check-doctor-static
        run: |
          # In a container job, github.workspace (context) may be the HOST path;
          # $GITHUB_WORKSPACE (env) is the in-container mount, so derive the core
          # plugin root from it to stay container-correct.
          export LIVESPEC_CORE_PLUGIN_ROOT="${GITHUB_WORKSPACE}/.livespec-core/.claude-plugin"
          just check-doctor-static

  # Real-TUI end-to-end gate (DELIVERABLE #0): drives the SHIPPED interactive TUI
  # through a real tmux pane (send-keys -> capture-pane -> assert), the first
  # automated coverage of the run_interactive_tui raw-mode/render path that the
  # rest of the pyramid compiles out. Its OWN job (not the matrix above) because
  # it needs `tmux`, which the base image does not yet carry — the step below
  # provisions it so the gate is self-sufficient regardless of the image (baking
  # tmux into the fabro-sandbox image is the follow-up that lets this step drop).
  #
  # NOT YET in `ci-green.needs`: kept advisory on this first landing so it does
  # not gate merges until it has proven stable in this environment. Promote it to
  # a required gate by adding `check-e2e-tmux` to `ci-green.needs` below.
  check-e2e-tmux:
    name: check-e2e-tmux
    runs-on: ${{ fromJSON(vars.CI_RUNNER_LABELS || '["self-hosted","local-ci"]') }}
    container:
      image: ghcr.io/thewoolleyman/livespec-fabro-sandbox:python-rust-v0.52.1
    env:
      MISE_DATA_DIR: /root/.local/share/mise
      MISE_NOT_FOUND_AUTO_INSTALL: "0"
      GITHUB_TOKEN: ${{ github.token }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Trust the workspace for git under hosted routing (baked container runs
      # git as ROOT over a uid-1001 checkout → "dubious ownership" exit 128).
      # See the `check` job for the full rationale. No-op on the self-hosted lane.
      - name: Trust workspace for git (hosted container root-vs-checkout uid)
        run: git config --global --add safe.directory '*'

      - name: mise trust + install (baked tools — install is a near-no-op)
        run: |
          mise trust
          mise install

      - name: Provision tmux (harness dependency, absent from the base image)
        run: |
          if ! command -v tmux >/dev/null 2>&1; then
            apt-get update && apt-get install -y --no-install-recommends tmux
          fi
          tmux -V

      - name: just check-e2e-tmux
        run: just check-e2e-tmux

  # Single all-green gate job (livespec epic livespec-cf4bcu,
  # fleet-ci-aggregate-coverage). This is the SOLE branch-protection
  # required context: it `needs:` every check-bearing job, so requiring
  # only `ci-green` blocks merges on the entire matrix + dedicated check
  # jobs via one stable context-name that never churns as checks are
  # added. Pure GitHub-expression gate (no external action, no direct
  # tool invocation): `always()` runs it even when a dependency failed,
  # and the step fails the job iff any dependency failed or was cancelled.
  ci-green:
    name: ci-green
    needs: [check, check-doctor-static]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: All required checks passed
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: exit 1
