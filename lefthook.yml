# lefthook.yml — livespec-console-beads-fabro git hook configuration.

pre-commit:
  commands:
    00-check-pre-commit:
      run: just check-pre-commit

commit-msg:
  commands:
    00-no-commit-on-master:
      run: |
        branch=$(git rev-parse --abbrev-ref HEAD)
        if [ "$branch" = "master" ]; then
          printf 'ERROR: direct commits to master are forbidden; create a feature branch first\n' >&2
          printf 'Hint: git checkout -b <branch-name>\n' >&2
          exit 1
        fi

pre-push:
  commands:
    check:
      run: just check-pre-push
