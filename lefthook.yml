# lefthook.yml — livespec-console-beads-fabro git hook configuration.
#
# Commit-refuse at the primary checkout is owned by the canonical STRUCTURAL
# commit-refuse hook (installed by `just install-commit-refuse-hooks`), the
# single Mechanism of the baseline Worktree-discipline concern — so there is no
# lefthook commit-msg `no-commit-on-master` job here: that branch-name guard was
# strictly redundant (master cannot be checked out in a worktree while it is in
# the primary, and the structural hook refuses every primary commit regardless
# of branch). A future commit-msg section will return when the Rust
# Red-Green-Replay enforcer lands (livespec-console-beads-fabro-mvu22t).

pre-commit:
  commands:
    00-check-pre-commit:
      run: just check-pre-commit

pre-push:
  commands:
    check:
      run: just check-pre-push
